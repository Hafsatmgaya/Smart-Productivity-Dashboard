<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-bar">
        <button class="menu"> <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1"/>
        </svg>
        </button>
        <p class="dynamic-greeting"> ☀️ Good morning, Hafsat </p>
            <h2 class="live-clock">7:45:12 AM</h2>
    </nav>

<div class="main">
    <div class="to-do-list">
        <h2 class="panel-title"> To-Do List</h2>
        <div class="todo-content">
        <div class="input-row">
        <input type="text" class="input-task" placeholder="Add a new task..."> 
        <button class="add-task"> Add task</button>
        </div> 
        <div class="task-item">
            <input type="checkbox">
            <span> Study Javascript</span>
            <button class="del-btn">🗑</button>
        </div> 
        <hr class="items-hr">
        <div class="task-item">
            <input type="checkbox">
            <span> Read a book</span>
            <button class="del-btn">🗑</button>
         </div>    
         <hr class="items-hr">
        <div class="task-item">
            <input type="checkbox">
            <span> Make breakfast</span>
            <button class="del-btn">🗑</button> 
         </div>       
         </div>
    </div>

        <div class="focus-timer">
            <div class="panel-title">Focus timer</div>
            <h1 class="timer">25:00</h1>
            <hr class="timer-hr">
            <div class="timer-btns">
            <button class="start-btn">Start</button>
            <button class="pause-btn">Pause</button>
            <button class="reset-btn">Reset</button>
            </div>
            <div class="motivation-text">Focus time 👍 Stay consistent </div>
        </div>    
</div>            
<div class="progress-section">
    <p class="progress-label"> Progress <span class="progress-section"></span> 3 out of 4 completed</p>
<div class="progress-bar-bg">
    <div class="progress-bar-fill"></div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
